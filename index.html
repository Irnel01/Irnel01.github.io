<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enilson Etienne | Site de test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            backdrop-filter: blur(4px);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.5rem;
            color: #1e1e2f;
            margin-bottom: 16px;
        }

        .badge {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .domain {
            background: #f3f4f6;
            padding: 16px;
            border-radius: 16px;
            margin: 24px 0;
            font-family: monospace;
            font-size: 1.2rem;
            word-break: break-all;
        }

        .status {
            padding: 12px;
            border-radius: 12px;
            margin: 20px 0;
            font-weight: 500;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .status.info {
            background: #dbeafe;
            color: #1e40af;
            border-left: 4px solid #3b82f6;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }

        .footer {
            margin-top: 32px;
            font-size: 0.8rem;
            color: #6b7280;
        }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 500px) {
            .card { padding: 24px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Enilson Etienne</h1>
        <div class="badge">✅ Site connecté</div>
        
        <p style="margin-bottom: 8px; color: #4b5563;">Ce site est hébergé sur</p>
        <div class="domain">
            📡 <span id="currentDomain">enilsonetienne.me</span>
        </div>

        <div id="statusMessage" class="status info">
            🔍 Vérification du domaine en cours...
        </div>

        <button id="testButton">
            🧪 Tester la connexion GitHub Pages
        </button>

        <div class="footer">
            <span id="timestamp"></span><br>
            Hébergé via GitHub Pages + Namecheap
        </div>
    </div>

    <script>
        // Mise à jour de l'horloge
        function updateTimestamp() {
            const now = new Date();
            const formatted = now.toLocaleString('fr-FR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('timestamp').innerHTML = `📅 ${formatted}`;
        }
        updateTimestamp();
        setInterval(updateTimestamp, 1000);

        // Récupère le domaine actuel depuis l'URL
        const currentHost = window.location.hostname;
        document.getElementById('currentDomain').innerText = currentHost;

        // Vérification du domaine
        const statusDiv = document.getElementById('statusMessage');
        const expectedDomain = 'enilsonetienne.me';
        
        if (currentHost === expectedDomain || currentHost === `www.${expectedDomain}`) {
            statusDiv.className = 'status success';
            statusDiv.innerHTML = '✅ <strong>Félicitations !</strong> Ton domaine est correctement pointé vers GitHub Pages.';
        } else if (currentHost === 'irnel01.github.io') {
            statusDiv.className = 'status info';
            statusDiv.innerHTML = '⚠️ <strong>Configuration DNS en cours</strong><br>Tu accèdes encore via GitHub.io. Attends la propagation DNS (15 min - 48h).';
        } else {
            statusDiv.className = 'status info';
            statusDiv.innerHTML = `🌐 Domaine actuel : <strong>${currentHost}</strong><br>Vérifie que tes enregistrements DNS chez Namecheap sont corrects.`;
        }

        // Bouton de test
        const testBtn = document.getElementById('testButton');
        
        testBtn.addEventListener('click', async () => {
            // État "chargement"
            const originalText = testBtn.innerHTML;
            testBtn.innerHTML = 'Vérification <span class="loader"></span>';
            testBtn.disabled = true;

            try {
                // Simule un appel vers une API GitHub (vérification publique)
                const response = await fetch('https://api.github.com/repos/Irnel01/Irnel01.github.io', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    testBtn.innerHTML = '✅ Connexion GitHub réussie !';
                    testBtn.style.background = '#10b981';
                    
                    // Ajoute une notification temporaire
                    const successMsg = document.createElement('div');
                    successMsg.className = 'status success';
                    successMsg.style.marginTop = '16px';
                    successMsg.innerHTML = '🎉 GitHub Pages répond correctement ! Ton site est en ligne.';
                    document.querySelector('.card').appendChild(successMsg);
                    setTimeout(() => successMsg.remove(), 5000);
                } else {
                    throw new Error('API GitHub inaccessible');
                }
            } catch (error) {
                testBtn.innerHTML = '❌ Erreur de connexion';
                testBtn.style.background = '#ef4444';
                
                const errorMsg = document.createElement('div');
                errorMsg.className = 'status info';
                errorMsg.style.marginTop = '16px';
                errorMsg.innerHTML = '⚠️ Impossible de contacter l\'API GitHub. Vérifie ta connexion internet.';
                document.querySelector('.card').appendChild(errorMsg);
                setTimeout(() => errorMsg.remove(), 5000);
            } finally {
                setTimeout(() => {
                    testBtn.innerHTML = originalText;
                    testBtn.style.background = '#667eea';
                    testBtn.disabled = false;
                }, 3000);
            }
        });
    </script>
</body>
</html>
